    <style>
        /* ── WITHNESS Mosaic Grid ──────────────────────── */
        .withness-section {
            padding: 0;
        }

        /* 12-column grid, gap 없는 시네마틱 타일 */
        .behind-mosaic {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: 22vw;
            /* 행 높이 기준 */
            gap: 3px;
            width: 100%;
        }

        /* 기본 타일 */
        .behind-tile {
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .behind-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* 기본: 흑백 */
            filter: grayscale(100%) brightness(0.85);
            transition: filter 0.6s var(--easing), transform 0.6s var(--easing);
        }

        /* hover: 컬러로 전환 */
        .behind-tile:hover img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.03);
        }

        /* ── 7장 배치: 4bfilm 스타일 불규칙 모자이크 ── */

        /* 1번: 큰 가로 (왼쪽 절반) — 카메라 짐벌 */
        .tile-1 {
            grid-column: 1 / 8;
            grid-row: 1 / 2;
        }

        /* 2번: 작은 정방형 (오른쪽 위, 위) — 미팅 장면 */
        .tile-2 {
            grid-column: 8 / 13;
            grid-row: 1 / 2;
        }

        /* 3번: 세로형 긴 타일 (왼쪽) — 카메라 들고 있는 인물 */
        .tile-3 {
            grid-column: 1 / 5;
            grid-row: 2 / 4;
        }

        /* 4번: 가로 중간 (중앙) — 사운드 스튜디오 */
        .tile-4 {
            grid-column: 5 / 13;
            grid-row: 2 / 3;
        }

        /* 5번: 가로 와이드 (오른쪽 아래) — 노란배경 촬영 */
        .tile-5 {
            grid-column: 5 / 13;
            grid-row: 3 / 4;
        }

        /* 6번: 남은 왼쪽 하단 */
        .tile-6 {
            grid-column: 1 / 7;
            grid-row: 4 / 5;
        }

        /* 7번: 남은 오른쪽 하단 */
        .tile-7 {
            grid-column: 7 / 13;
            grid-row: 4 / 5;
        }

        /* ── 모바일 ── */
        @media (max-width: 768px) {
            .behind-mosaic {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: 55vw;
                gap: 2px;
            }

            .tile-1,
            .tile-2,
            .tile-3,
            .tile-4,
            .tile-5,
            .tile-6,
            .tile-7 {
                grid-column: auto;
                grid-row: auto;
            }

            /* 모바일: 첫 사진만 2칸 넓게 */
            .tile-1 {
                grid-column: 1 / 3;
            }
        }
    </style>

    <script type="module">
        import works from './works.js';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = parseInt(urlParams.get('id'));

            console.log("Loading Project ID:", projectId);
            console.log("Total Works Available:", works.length);

            const project = works.find(w => w.id === projectId);

            if (!project) {
                console.error("Project not found!");
                // Optionally show error on page
                return;
            }

            console.log("Found Project:", project.title);
            document.getElementById('page-title').textContent = `${project.title} | WE WON PRODUCTION`;
            document.getElementById('project-client-name').textContent = project.client;
            document.getElementById('project-title-text').textContent = project.title;
            document.getElementById('project-description-text').textContent = project.description || 'No description available.';

            // Setup Video
            const videoWrapper = document.getElementById('project-video-wrapper');
            let videoUrl = project.videoUrl;

            // Apply correct aspect ratio class
            videoWrapper.classList.add(project.orientation === 'portrait' ? 'aspect-portrait' : 'aspect-landscape');

            if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
                // Ensure proper embed URL
                if (!videoUrl.includes('embed')) {
                    const videoId = videoUrl.split('v=')[1]?.split('&')[0] || videoUrl.split('/').pop();
                    videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                }
            } else if (videoUrl.includes('instagram.com')) {
                // Instagram already usually comes with /embed
            }

            const iframe = document.createElement('iframe');
            iframe.src = videoUrl;
            iframe.frameBorder = "0";
            iframe.allow = "autoplay; fullscreen";
            iframe.allowFullscreen = true;
            videoWrapper.appendChild(iframe);

            // GSAP Reveal
            gsap.from('.project-hero-media', { opacity: 0, y: 50, duration: 1.2, ease: 'power3.out' });
            gsap.from('.project-info-section .container', { opacity: 0, y: 30, duration: 1, delay: 0.5, ease: 'power3.out' });
        });
    </script>
